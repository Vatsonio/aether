services:
  aether:
    image: ghcr.io/vatsonio/aether:latest
    container_name: aether
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /opt/aether/config:/app/config:ro
      - /proc:/proc:ro
      - /sys:/sys:ro
    environment:
      - PORT=80
      - PYTHONUNBUFFERED=1
      # Recommended: pass OpenWeather key via environment (Portainer env vars or .env file)
      # - OPENWEATHER_API_KEY=your_key_here
      # - WEATHER_DEFAULT_CITY=Kyiv
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
