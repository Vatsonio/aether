version: '3.8'

services:
  aether:
    build: .
    container_name: aether
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./config:/app/config:ro
      - /proc:/proc:ro
      - /sys:/sys:ro
    pid: "host"
    network_mode: "host"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
