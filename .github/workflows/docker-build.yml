name: Build and Push Docker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Note on deprecations:
# - Node 20 deprecation on GitHub runners (now defaults to 24). Docker actions updated to latest (v6+).
# - punycode warning is from internal JS deps in actions/runners, non-fatal.
# Tag generation is now manual to avoid metadata-action producing invalid tags like ":-V1.x"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: get-version
        run: |
          VERSION=$(cat VERSION 2>/dev/null | tr -d '\n\r\t ' || true)
          if [ -z "$VERSION" ]; then
            VERSION="dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version tag: $VERSION"

      - name: Prepare tags
        id: prepare-tags
        run: |
          VERSION=$(cat VERSION 2>/dev/null | tr -d '\n\r\t ' || true)
          if [ -z "$VERSION" ]; then
            VERSION="dev"
          fi
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          TAGS="ghcr.io/vatsonio/aether:latest,ghcr.io/vatsonio/aether:$VERSION,ghcr.io/vatsonio/aether:sha-$SHORT_SHA"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Using tags: $TAGS"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.prepare-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
